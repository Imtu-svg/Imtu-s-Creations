        * {

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 20px 5%;
            border-bottom: 1px solid #00ff8833;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #00ff88, #00ffff);
            -webkit-background-clip: text;
            color: transparent;
        }

        .total {
            font-size: 15px;
            background: #00ff8833;
            color: #00ff88;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
        }

        .search-box {
            width: 100%;
            max-width: 520px;
            background: #111;
            border: 2px solid #00ff8844;
            border-radius: 50px;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }

        .search-box:focus-within {
            border-color: #00ff88;
            box-shadow: 0 0 20px #00ff8844;
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #fff;
            font-size: 17px;
        }

        .search-box input::placeholder {
            color: #888;
        }

        .main-container {
            padding: 40px 5%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
        }

        .app-card {
            display: block;
            background: #181818;
            border-radius: 22px;
            padding: 24px 18px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid #ffffff11;
        }

        .app-card:hover {
            transform: translateY(-12px) scale(1.04);
            box-shadow: 0 20px 40px rgba(0, 255, 136, 0.25);
            border-color: #00ff88;
        }

        .app-card img {
            width: 96px;
            height: 96px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s;
        }

        .app-card:hover img {
            transform: scale(1.12) rotate(6deg);
        }

        .app-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .app-version {
            font-size: 14px;
            color: #00ff88;
            font-weight: 600;
            background: #00ff8811;
            padding: 4px 14px;
            border-radius: 30px;
            display: inline-block;
        }

        .no-result {
            text-align: center;
            padding: 80px 20px;
            font-size: 18px;
            color: #666;
            grid-column: 1 / -1;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 18px;
            }
            .app-card {
                padding: 20px 14px;
            }
            .app-card img {
                width: 82px;
                height: 82px;
            }

        // কার্ড রেন্ডার করার ফাংশন
        function renderApps(filteredApps) {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = '';

            if (filteredApps.length === 0) {
                grid.innerHTML = `
                    <div class="no-result">
                        <h2>😕 কোনো অ্যাপ পাওয়া যায়নি</h2>
                        <p>অন্য কীওয়ার্ড দিয়ে সার্চ করুন</p>
                    </div>`;
                return;
            }

            filteredApps.forEach(app => {
                const cardHTML = `
                    <a href="${app.apk}" download="${app.name}.apk" class="app-card">
                        <img src="${app.icon}" alt="${app.name}">
                        <div class="app-name">${app.name}</div>
                        <div class="app-version">v${app.version}</div>
                    </a>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // সার্চ ফাংশন
        function filterApps() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = apps.filter(app => 
                app.name.toLowerCase().includes(query)
            );
            renderApps(filtered);
        }
